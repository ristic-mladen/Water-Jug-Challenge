<import from="../../components/solution-steps/solution-steps"></import>
<import from="../../components/jug-color-picker/jug-color-picker"></import>

<section class="card mb-6 bg-base-100 shadow-xl">
  <div class="card-body">
    <h1 class="card-title text-3xl" t="homePage.title"></h1>
    <p class="text-base-content/70" t="homePage.description"></p>

    <form class="mt-2 grid gap-5" submit.trigger="findSolution()">
      <div class="relative grid gap-2 md:grid-cols-[1fr_auto] md:items-end">
        <label class="form-control w-full">
          <span class="label-text" t="homePage.jug1Capacity"></span>
          <input class="input input-bordered w-full" type="number" min="1" value.bind="form.jug1Capacity | number & validate">
        </label>
        <button class="btn btn-outline" type="button" click.trigger="toggleJugColorPicker('jug1')">
          <span class="inline-block h-4 w-4 rounded-full border border-base-content/40" style.bind="{ backgroundColor: jug1Color }"></span>
          <span class="label-text" t="homePage.jug1Color"></span>
        </button>
      <jug-color-picker
        if.bind="activePicker === 'jug1'"
        color.bind="jug1Color"
        on-color-selected.bind="updateJug1Color">
      </jug-color-picker>
      </div>

      <div class="relative grid gap-2 md:grid-cols-[1fr_auto] md:items-end">
        <label class="form-control w-full">
          <span class="label-text" t="homePage.jug2Capacity"></span>
          <input class="input input-bordered w-full" type="number" min="1" value.bind="form.jug2Capacity | number & validate">
        </label>
        <button class="btn btn-outline" type="button" click.trigger="toggleJugColorPicker('jug2')">
          <span class="inline-block h-4 w-4 rounded-full border border-base-content/40" style.bind="{ backgroundColor: jug2Color }"></span>
          <span class="label-text" t="homePage.jug2Color"></span>
        </button>
      <jug-color-picker
        if.bind="activePicker === 'jug2'"
        color.bind="jug2Color"
        on-color-selected.bind="updateJug2Color">
      </jug-color-picker>
      </div>

      <label class="form-control">
        <span class="label-text" t="homePage.targetAmount"></span>
        <input class="input input-bordered" type="number" min="1" value.bind="form.targetAmount | number & validate">
      </label>

      <div class="mt-1">
        <button class="btn btn-primary w-full md:w-auto" type="submit" disabled.bind="isLoading">
          ${isLoading ? 'homePage.solving' : 'homePage.findSolution' & t}
        </button>
      </div>
    </form>
  </div>
</section>

<solution-steps steps.bind="currentSteps" target-amount.bind="resultTargetAmount"></solution-steps>
<section if.bind="hasSearched && currentSteps.length === 0" class="card-title">
  <span t="homePage.noSolutionFound"></span>
</section>
