<section if.bind="steps.length > 0" class="card bg-base-100 shadow-xl">
  <div class="card-body">
    <h2 class="card-title" t="homePage.bestFoundSolution"></h2>
    <div class="overflow-x-auto">
      <table class="table table-zebra">
    <thead>
      <tr>
        <th t="homePage.jug1WaterLevel"></th>
        <th t="homePage.jug2WaterLevel"></th>
        <th t="homePage.action"></th>
      </tr>
    </thead>
    <tbody>
      <tr repeat.for="step of steps">
        <td class="${step.jug1WaterLevel === targetAmount ? 'font-bold' : ''}">
          ${step.jug1WaterLevel}
        </td>
        <td class="${step.jug2WaterLevel === targetAmount ? 'font-bold' : ''}">
          ${step.jug2WaterLevel}
        </td>
        <td>
          ${step.jugAction | jugAction}
        </td>
      </tr>
    </tbody>
      </table>
    </div>
  </div>
</section>
